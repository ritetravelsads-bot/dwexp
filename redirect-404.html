<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Not Found</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
  }

  .card {
    background: rgba(241, 66, 1, 0.7);
    backdrop-filter: blur(10px);
    padding: 40px 50px;
    border-radius: 16px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    animation: fadeIn 0.8s ease-in-out;
  }

  h2 {
    font-size: 28px;
    margin-bottom: 12px;
  }

  p {
    font-size: 15px;
    opacity: 0.95;
    line-height: 1.6;
  }

  .loader {
    margin: 25px auto 0;
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>

<body>
  <div class="card">
    <h2>Thank you for visiting our website</h2>
    <p>The page you're looking for is unavailable. You will be automatically redirected to the home page shortly.</p>
    <div class="loader"></div>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = "/#residential-project";
    }, 2000);
  </script>
</body>
</html>
